<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Salon - AI Reading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Zen+Old+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
/* === BASE === */
:root {
    --bg-color: #FDFBF7;
    --text-color: #333333;
    --accent-color: #C5A059;
    --accent-hover: #A77D4A;
    --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    --font-jp: 'Zen Old Mincho', serif;
    --font-en: 'Cormorant Garamond', serif;
}
body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-jp);
    margin: 0; padding: 0;
    line-height: 1.6;
    display: flex; flex-direction: column; min-height: 100vh;
    overflow-x: hidden;
}
.site-header {
    text-align: center;
    padding: 3rem 1rem;
    border-bottom: 1px solid rgba(197,160,89,0.2);
}
.site-header h1 {
    font-family: var(--font-en);
    font-size: 3rem; margin: 0;
    font-weight: 400; letter-spacing: 0.1em;
}
.subtitle { font-size: 0.9rem; color: var(--accent-color); margin-top: 0.5rem; letter-spacing: 0.2em; }
main { flex: 1; padding: 2rem 1rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
h2, h3 { text-align: center; font-weight: 400; margin-bottom: 1.5rem; }

/* === API KEY SETUP === */
.api-setup {
    max-width: 520px; margin: 0 auto 2.5rem;
    background: #fff; border: 1px solid rgba(197,160,89,0.25);
    border-radius: 8px; padding: 1.8rem 2rem;
    box-shadow: var(--card-shadow);
}
.api-setup h3 { margin-top: 0; font-size: 1rem; letter-spacing: 0.08em; color: var(--accent-color); text-align: left; }
.api-setup p { font-size: 0.82rem; color: #888; line-height: 1.7; margin: 0 0 1rem; }
.api-setup a { color: var(--accent-color); }
.api-row { display: flex; gap: 0.6rem; align-items: center; }
.api-row input {
    flex: 1; padding: 0.6rem 0.8rem;
    border: 1px solid rgba(197,160,89,0.35); border-radius: 4px;
    font-family: var(--font-en); font-size: 0.9rem;
    background: var(--bg-color); color: var(--text-color);
    outline: none;
}
.api-row input:focus { border-color: var(--accent-color); }
.api-save-btn {
    padding: 0.6rem 1.2rem;
    background: var(--accent-color); color: #fff;
    border: none; border-radius: 4px;
    font-family: var(--font-jp); font-size: 0.85rem;
    cursor: pointer; white-space: nowrap;
    transition: background 0.2s;
}
.api-save-btn:hover { background: var(--accent-hover); }
.api-status { font-size: 0.78rem; margin-top: 0.5rem; height: 1em; }
.api-status.ok { color: var(--accent-color); }
.api-status.err { color: #9e2a2b; }

/* === CARDS === */
.cards-container {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 1rem; max-width: 900px; margin: 0 auto;
}
.card-slot {
    display: flex; flex-direction: column;
    align-items: center; width: 110px;
    animation: fadeIn 1s ease-in-out; text-align: center;
}
.card-visual {
    width: 100px; height: 170px;
    background-color: #fff;
    border: 1px solid #e0e0e0; border-radius: 6px;
    box-shadow: var(--card-shadow);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.5rem; position: relative;
    transition: transform 0.5s ease; overflow: hidden;
}
.tarot-image {
    width: 100%; height: 100%; object-fit: cover; display: block;
}
.card-visual.reversed { transform: rotate(180deg); }
.visual-inner {
    text-align: center; font-family: var(--font-en);
    font-size: 1rem; line-height: 1.1;
    color: var(--accent-color); opacity: 0.8;
    word-break: break-word; padding: 0 2px;
    width: 100%; height: 100%;
}
.position-name { font-size: 0.75rem; color: #888; margin-bottom: 0.3rem; height: 1.1em; white-space: nowrap; }
.card-name { font-family: var(--font-jp); font-weight: 600; font-size: 0.9rem; line-height: 1.2; }

/* === RESULT LAYOUT === */
.result-wrapper { display: flex; flex-direction: row; gap: 2rem; justify-content: center; align-items: flex-start; width: 100%; }
.visual-area { flex: 2; display: flex; justify-content: center; flex-direction: column; align-items: center; }
.list-area { flex: 1; min-width: 250px; text-align: left; display: flex; gap: 1rem; }
.list-separator { width: 1px; background: linear-gradient(to bottom, transparent, var(--accent-color), transparent); position: relative; display: flex; align-items: center; justify-content: center; }
.separator-icon { background: var(--bg-color); color: var(--accent-color); padding: 0.5rem 0; font-size: 1.2rem; }
.result-list { list-style: none; padding: 0; margin: 0; width: 100%; }
.result-list li { margin-bottom: 0.8rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: baseline; }
.list-pos { font-size: 0.85rem; color: #888; margin-right: 1rem; min-width: 60px; }
.list-name { font-weight: 600; }
.reversed-mark { color: #9E2A2B; font-family: var(--font-en); font-weight: 600; margin-left: 0.3rem; font-size: 0.9em; }

/* === AI READING SECTION === */
.reading-section {
    max-width: 680px; margin: 2rem auto 0;
    border-top: 1px solid rgba(197,160,89,0.2);
    padding-top: 2rem;
}
.reading-char-label { text-align: center; font-size: 0.8rem; color: var(--accent-color); letter-spacing: 0.15em; margin-bottom: 1rem; opacity: 0.8; }
.question-field {
    width: 100%; box-sizing: border-box; padding: 0.8rem 1rem;
    border: 1px solid rgba(197,160,89,0.35); border-radius: 4px;
    font-family: var(--font-jp); font-size: 0.95rem;
    background: var(--bg-color); color: var(--text-color);
    outline: none; resize: none; line-height: 1.6; margin-bottom: 1rem;
}
.reading-btn { display: block; margin: 0 auto; padding: 0.8rem 2.5rem; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); font-family: var(--font-jp); font-size: 1rem; letter-spacing: 0.12em; border-radius: 2px; cursor: pointer; transition: all 0.3s; }
.reading-output { margin-top: 1.8rem; font-family: var(--font-jp); font-size: 0.95rem; line-height: 2; color: var(--text-color); white-space: pre-wrap; border-left: 2px solid rgba(197,160,89,0.35); padding-left: 1.2rem; min-height: 2em; }
.reading-loading { text-align: center; color: var(--accent-color); font-size: 0.85rem; letter-spacing: 0.15em; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.reading-error { color: #9e2a2b; font-size: 0.85rem; margin-top: 1rem; }

/* === TAROT LAYOUTS === */
.cards-container.tarot-one-layout { display: grid; grid-template-areas: "msg"; justify-content: center; padding: 1rem; }
.cards-container.tarot-three-layout { display: grid; grid-template-areas: "past present future"; grid-template-columns: repeat(3, 120px); justify-content: center; gap: 1.5rem; }
.cards-container.tarot-greek-layout { display: grid; grid-template-areas: ". advice ." "feelings present outcome" ". obstacle ."; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 170px); justify-content: center; gap: 1rem; }
.cards-container.tarot-horseshoe-layout { display: grid !important; grid-template-columns: repeat(7, 1fr); grid-template-rows: 60px 60px 60px 170px; grid-template-areas: "past . . . . . outcome" ". present . . . obstacles ." ". . near_future . influences . ." ". . . advice . . ."; justify-content: center; gap: 0.5rem; padding: 2rem 0; max-width: 1000px; margin: 0 auto; }
.cards-container.tarot-horseshoe-layout .card-slot { width: 100px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin: 0 auto; }
.cards-container.tarot-horseshoe-layout .card-visual { width: 100px !important; height: 170px !important; flex-shrink: 0; }
.cards-container.tarot-celtic-layout { display: grid; grid-template-columns: 120px 120px 120px 50px 120px; grid-template-rows: repeat(4, 170px); grid-template-areas: ". conscious . . outcome" "past cross_center near_future . hopes" ". unconscious . . external" ". . . . querent"; justify-content: center; gap: 0.5rem; padding: 1rem 0; }
.cards-container.tarot-celtic-layout .card-slot { height: 100%; justify-content: center; position: relative; }
.cards-container.tarot-celtic-layout .card-slot:first-child .card-name { display: none; }
.tarot-celtic-layout .celtic-obstacle { transform: none; grid-area: cross_center; z-index: 2; pointer-events: none; justify-content: center; height: 100%; }
.tarot-celtic-layout .celtic-obstacle .card-visual { transform: rotate(90deg); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

/* === CHARACTER SELECTION === */
.character-options { display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 2rem; }
.char-btn { display: flex; flex-direction: column; align-items: center; width: 150px; padding: 1.4rem 1rem; border-radius: 8px; background: #fff; box-shadow: var(--card-shadow); border: 1px solid rgba(197,160,89,0.25); cursor: pointer; transition: all 0.3s; gap: 0.4rem; }
.char-btn:hover, .char-btn.active { border-color: var(--accent-color); background: rgba(197,160,89,0.06); transform: translateY(-2px); }
.char-icon { font-size: 1.8rem; }
.char-name { font-family: var(--font-en); font-size: 1.2rem; letter-spacing: 0.08em; color: var(--text-color); }
.char-desc { font-size: 0.72rem; color: #999; line-height: 1.4; text-align: center; }

.next-btn { display: block; margin: 0 auto; padding: 0.7rem 2rem; font-size: 0.95rem; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); font-family: var(--font-jp); letter-spacing: 0.1em; border-radius: 2px; cursor: pointer; transition: all 0.3s; }
.next-btn:hover { background: var(--accent-color); color: #fff; }

.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.8s ease-in-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: #999; border-top: 1px solid rgba(0,0,0,0.05); margin-top: auto; }
footer a { color: #bbb; text-decoration: none; margin: 0 0.8rem; }

@media (max-width: 768px) {
    .site-header h1 { font-size: 2.2rem; }
    .result-wrapper { flex-direction: column; align-items: center; }
    .list-area { width: 100%; border-top: 1px solid var(--accent-color); padding: 1rem 0.5rem; }
    .card-visual { width: 75px; height: 128px; }
    .card-slot { width: 80px; }
    .tarot-celtic-layout { transform: scale(0.6); transform-origin: top center; height: 400px; overflow: visible; }
    .cards-container.tarot-greek-layout { transform: scale(0.6); transform-origin: top center; width: 166%; margin-left: -33%; margin-bottom: -200px; }
    .cards-container.tarot-horseshoe-layout { transform: scale(0.52); transform-origin: top center; height: 360px; overflow: visible; margin-bottom: -180px; }
}
    </style>
</head>
<body>

<header class="site-header">
    <h1>Luminous Salon</h1>
    <p class="subtitle">Tarot Reading</p>
</header>

<main>
    <!-- API Key Setup -->
    <div class="api-setup" id="apiSetup">
        <h3>OpenRouter API Key</h3>
        <div class="api-row">
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." autocomplete="off">
            <button class="api-save-btn" onclick="saveApiKey()">保存</button>
        </div>
        <div class="api-status" id="apiStatus"></div>
    </div>

    <!-- Selection -->
    <section id="selection-area" class="fade-in">
        <div class="step" id="step-character">
            <h2>リーダーを選択</h2>
            <div class="character-options">
                <button class="char-btn" data-char="ren">🌙<span class="char-name">レン</span></button>
                <button class="char-btn" data-char="miharu">✨<span class="char-name">ミハル</span></button>
                <button class="char-btn" data-char="kazuko">🌸<span class="char-name">カズコ</span></button>
            </div>
        </div>
        <div class="step hidden" id="step-question">
            <h2>相談内容</h2>
            <textarea class="question-field" id="questionInput" rows="3" placeholder="問いを入力してください"></textarea>
            <button class="next-btn" onclick="goToSpread()">スプレッドを選ぶ →</button>
        </div>
        <div class="step hidden" id="step-spread">
            <h3>スプレッドを選択</h3>
            <div id="spread-options" class="spread-options"></div>
            <button id="divinate-btn" class="action-btn hidden">占う</button>
        </div>
    </section>

    <!-- Result -->
    <section id="result-area" class="hidden">
        <div class="result-wrapper">
            <div id="visual-area" class="visual-area"></div>
            <div id="list-area" class="list-area hidden">
                <ul id="result-list" class="result-list"></ul>
            </div>
        </div>
        <div class="reading-section" id="readingSection">
            <div id="reading-char-label" class="reading-char-label"></div>
            <div id="readingOutput" class="reading-output"></div>
            <div id="readingError" class="reading-error hidden"></div>
        </div>
    </section>
    <button id="reset-btn" class="action-btn secondary hidden">もう一度占う</button>
</main>

<footer>
    <p>&copy; 2025 Luminous Salon. Designed by Urara Ichika.</p>
    <p><a href="terms.html">利用規約</a> | <a href="tokushoho.html">特定商取引法</a></p>
</footer>

<script>
// === LOGIC ===
const READING_PRINCIPLES = `
【最優先：絶対禁止事項】
利用規約に基づき、以下の内容には一切回答せず、丁重にお断りすること：
1. 生死に関わること（寿命、妊娠・出産の成否、病気の予後、死期など）
2. 医療・診断・治療方針（「この薬は効くか」「この病気は治るか」など）
3. ギャンブル・投機・投資（株、FX、勝敗予想、利益予測など）
4. 特定の人物の不幸、不利益、破滅を願う呪詛的な内容
上記に該当する場合、「規約によりお答えできません。別のテーマでご相談ください」と回答を終了してください。

【リーディング原則】
カードの象徴に基づき、誠実に読み解くこと。道徳的評価や説教は不要。
不倫や複雑な恋愛については、批判せずエネルギーの流れを伝える。`;

const CHARACTERS = {
    ren: { name: 'レン', systemPrompt: `あなたは占い師「レン」。クールで鋭い口調。${READING_PRINCIPLES}` },
    miharu: { name: 'ミハル', systemPrompt: `あなたは占い師「ミハル」。穏やかで包み込む口調。${READING_PRINCIPLES}` },
    kazuko: { name: 'カズコ', systemPrompt: `あなたは占い師「カズコ」。関西弁の親しみやすい口調。${READING_PRINCIPLES}` }
};

const TAROT_DATA = {
    majors: ["The Fool","The Magician","The High Priestess","The Empress","The Emperor","The Hierophant","The Lovers","The Chariot","Strength","The Hermit","Wheel of Fortune","Justice","The Hanged Man","Death","Temperance","The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"],
    suits: ["Wands","Cups","Swords","Pentacles"],
    ranks: ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"],
    translate: (n) => {
        const mj = {"The Fool":"愚者","The Magician":"魔術師","The High Priestess":"女教皇","The Empress":"女帝","The Emperor":"皇帝","The Hierophant":"法王","The Lovers":"恋人","The Chariot":"戦車","Strength":"力","The Hermit":"隠者","Wheel of Fortune":"運命の輪","Justice":"正義","The Hanged Man":"吊るされた男","Death":"死神","Temperance":"節制","The Devil":"悪魔","The Tower":"塔","The Star":"星","The Moon":"月","The Sun":"太陽","Judgement":"審判","The World":"世界"};
        if(mj[n]) return mj[n];
        const sm={"Wands":"ワンド","Cups":"カップ","Swords":"ソード","Pentacles":"ペンタクル"}, rm={"Ace":"エース","Two":"2","Three":"3","Four":"4","Five":"5","Six":"6","Seven":"7","Eight":"8","Nine":"9","Ten":"10","Page":"ペイジ","Knight":"ナイト","Queen":"クイーン","King":"キング"};
        const p=n.split(" of "); return p.length===2 ? `${sm[p[1]]}の${rm[p[0]]}` : n;
    }
};

const SPREADS = {
    "one": { count:1, name:"ワンオラクル", layout:["メッセージ"], gridAreas:["msg"] },
    "three": { count:3, name:"3枚引き", layout:["過去","現状","未来"], gridAreas:["past","present","future"] },
    "celtic": { count:10, name:"ケルト十字", layout:["現状","障害","意識","過去","意図","未来","自分","環境","願望","結果"], gridAreas:["cross_center","cross_center","unconscious","past","conscious","near_future","querent","external","hopes","outcome"] }
};

let state = { character:null, spread:null };
let drawn = [];

function saveApiKey(){ localStorage.setItem('luminous_key', document.getElementById('apiKeyInput').value); alert('保存しました'); }
function getApiKey(){ return localStorage.getItem('luminous_key'); }

document.querySelectorAll('.char-btn').forEach(b => b.addEventListener('click', () => {
    state.character = b.dataset.char;
    document.getElementById('step-question').classList.remove('hidden');
}));

function goToSpread(){
    document.getElementById('step-spread').classList.remove('hidden');
    const opts = document.getElementById('spread-options'); opts.innerHTML = '';
    Object.keys(SPREADS).forEach(k => {
        const btn = document.createElement('button'); btn.className='spread-btn'; btn.textContent=SPREADS[k].name;
        btn.onclick = () => { state.spread = k; document.getElementById('divinate-btn').classList.remove('hidden'); };
        opts.appendChild(btn);
    });
}

document.getElementById('divinate-btn').onclick = () => {
    document.getElementById('selection-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    const def = SPREADS[state.spread];
    let deck = [];
    TAROT_DATA.majors.forEach(n => deck.push({name:n}));
    TAROT_DATA.suits.forEach(s => TAROT_DATA.ranks.forEach(r => deck.push({name:`${r} of ${s}`})));
    deck.sort(() => Math.random() - 0.5);
    const cards = deck.slice(0, def.count).map(c => ({ ...c, isUpright: Math.random() > 0.5, jp: TAROT_DATA.translate(c.name) }));
    drawn = cards.map((c, i) => ({ pos: def.layout[i], name: c.jp, orient: c.isUpright ? '正位置' : '逆位置' }));
    
    const container = document.createElement('div'); container.className = `cards-container tarot-${state.spread}-layout`;
    cards.forEach((c, i) => {
        const slot = document.createElement('div'); slot.className = 'card-slot';
        if(def.gridAreas[i]) slot.style.gridArea = def.gridAreas[i];
        const visual = document.createElement('div'); visual.className = 'card-visual';
        if(!c.isUpright) visual.classList.add('reversed');
        const img = document.createElement('img'); img.className = 'tarot-image';
        img.src = getPath(c.name);
        visual.appendChild(img); slot.appendChild(visual);
        const nm = document.createElement('div'); nm.className='card-name'; nm.textContent=c.jp;
        slot.appendChild(nm); container.appendChild(slot);
    });
    document.getElementById('visual-area').appendChild(container);
    requestAI();
};

function getPath(name){
    const base = 'assets/images/tarot/';
    const mj = {"The Fool":"m00","The Magician":"m01","The High Priestess":"m02","The Empress":"m03","The Emperor":"m04","The Hierophant":"m05","The Lovers":"m06","The Chariot":"m07","Strength":"m08","The Hermit":"m09","Wheel of Fortune":"m10","Justice":"m11","The Hanged Man":"m12","Death":"m13","Temperance":"m14","The Devil":"m15","The Tower":"m16","The Star":"m17","The Moon":"m18","The Sun":"m19","Judgement":"m20","The World":"m21"};
    if(mj[name]) return base + mj[name] + '.jpg';
    const s={"Wands":"w","Cups":"c","Swords":"s","Pentacles":"p"}, r={"Ace":"01","Two":"02","Three":"03","Four":"04","Five":"05","Six":"06","Seven":"07","Eight":"08","Nine":"09","Ten":"10","Page":"11","Knight":"12","Queen":"13","King":"14"};
    const p=name.split(" of "); return base + s[p[1]] + r[p[0]] + '.jpg';
}

async function requestAI(){
    const output = document.getElementById('readingOutput'); output.innerHTML = '<div class="reading-loading">魂を込めて読み解いています...</div>';
    const char = CHARACTERS[state.character];
    const prompt = `相談：${document.getElementById('questionInput').value}\n展開：${drawn.map(d => `${d.pos}:${d.name}(${d.orient})`).join('\n')}`;
    try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}` },
            body: JSON.stringify({ model: 'qwen/qwen-2.5-72b-instruct', messages: [{role:'system', content:char.systemPrompt}, {role:'user', content:prompt}] })
        });
        const data = await res.json();
        output.textContent = data.choices[0].message.content;
    } catch(e) { output.textContent = 'エラー：' + e.message; }
    document.getElementById('reset-btn').classList.remove('hidden');
}

document.getElementById('reset-btn').onclick = () => location.reload();
</script>
</body>
</html>
