<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Salon - AI Reading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Zen+Old+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
/* === BASE === */
:root {
    --bg-color: #FDFBF7;
    --text-color: #333333;
    --accent-color: #C5A059;
    --accent-hover: #A77D4A;
    --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    --font-jp: 'Zen Old Mincho', serif;
    --font-en: 'Cormorant Garamond', serif;
}
body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-jp);
    margin: 0; padding: 0;
    line-height: 1.6;
    display: flex; flex-direction: column; min-height: 100vh;
    overflow-x: hidden;
}
.site-header {
    text-align: center;
    padding: 3rem 1rem;
    border-bottom: 1px solid rgba(197,160,89,0.2);
}
.site-header h1 {
    font-family: var(--font-en);
    font-size: 3rem; margin: 0;
    font-weight: 400; letter-spacing: 0.1em;
}
.subtitle { font-size: 0.9rem; color: var(--accent-color); margin-top: 0.5rem; letter-spacing: 0.2em; }
main { flex: 1; padding: 2rem 1rem; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
h2, h3 { text-align: center; font-weight: 400; margin-bottom: 1.5rem; }

/* === API KEY SETUP === */
.api-setup {
    max-width: 520px; margin: 0 auto 2.5rem;
    background: #fff; border: 1px solid rgba(197,160,89,0.25);
    border-radius: 8px; padding: 1.8rem 2rem;
    box-shadow: var(--card-shadow);
}
.api-setup h3 { margin-top: 0; font-size: 1rem; letter-spacing: 0.08em; color: var(--accent-color); text-align: left; }
.api-setup p { font-size: 0.82rem; color: #888; line-height: 1.7; margin: 0 0 1rem; }
.api-row { display: flex; gap: 0.6rem; align-items: center; }
.api-row input {
    flex: 1; padding: 0.6rem 0.8rem;
    border: 1px solid rgba(197,160,89,0.35); border-radius: 4px;
    font-family: var(--font-en); font-size: 0.9rem;
    background: var(--bg-color); color: var(--text-color); outline: none;
}
.api-save-btn {
    padding: 0.6rem 1.2rem;
    background: var(--accent-color); color: #fff;
    border: none; border-radius: 4px;
    font-family: var(--font-jp); font-size: 0.85rem;
    cursor: pointer; transition: background 0.2s;
}
.api-save-btn:hover { background: var(--accent-hover); }

/* === SELECTION UI === */
.character-options, .spread-options {
    display: flex; justify-content: center; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 2rem;
}
.char-btn, .spread-btn {
    background: #fff; border: 1px solid rgba(197,160,89,0.25);
    color: var(--text-color); font-family: var(--font-jp);
    cursor: pointer; transition: all 0.3s;
}
.char-btn {
    display: flex; flex-direction: column; align-items: center;
    width: 140px; padding: 1.5rem 1rem; border-radius: 8px; box-shadow: var(--card-shadow);
}
.char-btn .char-name { font-size: 1.1rem; margin-top: 0.5rem; font-family: var(--font-en); letter-spacing: 0.05em; }
.char-btn:hover, .char-btn.active { border-color: var(--accent-color); background: rgba(197,160,89,0.05); transform: translateY(-2px); }

.spread-btn { padding: 0.8rem 1.8rem; border-radius: 30px; font-size: 0.95rem; }
.spread-btn:hover, .spread-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }

.action-btn {
    display: block; margin: 2rem auto; padding: 1rem 3.5rem;
    background: var(--text-color); color: #fff;
    border: none; border-radius: 2px; font-size: 1.1rem;
    letter-spacing: 0.15em; cursor: pointer; transition: all 0.3s;
}
.action-btn:hover { background: var(--accent-color); }
.action-btn.secondary { background: transparent; border: 1px solid var(--text-color); color: var(--text-color); }

/* === CARDS === */
.cards-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; max-width: 1000px; margin: 0 auto; }
.card-slot { display: flex; flex-direction: column; align-items: center; width: 110px; text-align: center; }
.card-visual {
    width: 100px; height: 170px; background: #fff; border: 1px solid #eee; border-radius: 6px;
    box-shadow: var(--card-shadow); overflow: hidden; position: relative; transition: transform 0.5s;
}
.tarot-image { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-visual.reversed { transform: rotate(180deg); }
.card-name { font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; color: #666; }

/* === RESULT LAYOUT === */
.result-wrapper { display: flex; gap: 2rem; justify-content: center; align-items: flex-start; margin-top: 2rem; }
.visual-area { flex: 2; }
.reading-section { max-width: 700px; margin: 3rem auto; border-top: 1px solid rgba(197,160,89,0.2); padding-top: 2rem; }
.reading-output { font-size: 1rem; line-height: 2; white-space: pre-wrap; border-left: 2px solid var(--accent-color); padding-left: 1.5rem; color: #444; }
.reading-loading { text-align: center; color: var(--accent-color); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.hidden { display: none !important; }
footer { text-align: center; padding: 3rem; font-size: 0.85rem; color: #999; border-top: 1px solid #eee; margin-top: auto; }
footer a { color: #999; text-decoration: none; margin: 0 0.5rem; }

/* === TAROT LAYOUTS (Desktop) === */
.cards-container.tarot-celtic-layout { display: grid; grid-template-columns: repeat(5, 110px); grid-template-rows: repeat(4, 180px); grid-template-areas: ". conscious . . outcome" "past cross_center near_future . hopes" ". unconscious . . external" ". . . . querent"; justify-content: center; }
.tarot-celtic-layout .celtic-obstacle { grid-area: cross_center; z-index: 2; transform: translateY(20px); }
.tarot-celtic-layout .celtic-obstacle .card-visual { transform: rotate(90deg); }

@media (max-width: 768px) {
    .site-header h1 { font-size: 2.2rem; }
    .cards-container.tarot-celtic-layout { transform: scale(0.65); transform-origin: top center; height: 480px; }
}
    </style>
</head>
<body>

<header class="site-header">
    <h1>Luminous Salon</h1>
    <p class="subtitle">Tarot Reading Professional</p>
</header>

<main>
    <div class="api-setup" id="apiSetup">
        <h3>OpenRouter API Key</h3>
        <div class="api-row">
            <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
            <button class="api-save-btn" onclick="saveApiKey()">保存</button>
        </div>
    </div>

    <section id="selection-area">
        <div class="step" id="step-character">
            <h2>リーダーを選択</h2>
            <div class="character-options">
                <button class="char-btn" data-char="ren">🌙<span class="char-name">Ren</span></button>
                <button class="char-btn" data-char="miharu">✨<span class="char-name">Miharu</span></button>
                <button class="char-btn" data-char="kazuko">🌸<span class="char-name">Kazuko</span></button>
            </div>
        </div>
        <div class="step hidden" id="step-question">
            <h2>相談内容</h2>
            <textarea class="question-field" id="questionInput" rows="3" placeholder="問いを入力してください"></textarea>
            <button class="action-btn" onclick="goToSpread()">スプレッドを選ぶ</button>
        </div>
        <div class="step hidden" id="step-spread">
            <h3>スプレッドを選択</h3>
            <div id="spread-options" class="spread-options"></div>
            <button id="divinate-btn" class="action-btn hidden">占う</button>
        </div>
    </section>

    <section id="result-area" class="hidden">
        <div id="visual-area" class="visual-area"></div>
        <div class="reading-section">
            <div id="readingOutput" class="reading-output"></div>
        </div>
        <button id="reset-btn" class="action-btn secondary" onclick="location.reload()">もう一度占う</button>
    </section>
</main>

<footer>
    <p>&copy; 2025 Luminous Salon. Designed by Urara Ichika.</p>
    <p><a href="terms.html">利用規約</a> | <a href="tokushoho.html">特定商取引法</a></p>
</footer>

<script>
const READING_PRINCIPLES = `
【最重要：鉄壁の規約遵守命令】
回答を開始する前に、相談内容が以下の「禁止事項」に該当するかを厳格に判定せよ。
1. 生死に関わること（寿命、病気の成否、妊娠・出産の予後、死期等）
2. 医療・診断・治療方針の提示
3. ギャンブル・投資・投機の予想
4. 特定人物の不幸を願う内容
該当する場合、カードの解釈を一切行わず、即座に以下の定型文のみを出力して終了せよ：
「規約によりお答えできません。生死、医療、ギャンブル、または誰かの不幸に関わるテーマには対応しておりません。別のテーマでご相談ください。」
※「該当しそうですが...」といった前置きや、カードの断片的な意味を述べることも厳禁する。

【リーディング原則】
禁止事項に該当しない場合のみ、カードの象徴を誠実に読み解くこと。説教や道徳的判断は不要。`;

const CHARACTERS = {
    ren: { name: 'レン', prompt: `あなたは占い師「レン」。クールで鋭い。${READING_PRINCIPLES}` },
    miharu: { name: 'ミハル', prompt: `あなたは占い師「ミハル」。穏やかで包み込む。${READING_PRINCIPLES}` },
    kazuko: { name: 'カズコ', prompt: `あなたは占い師「カズコ」。関西弁の親しみやすい口調。${READING_PRINCIPLES}` }
};

const TAROT_DATA = {
    majors: ["The Fool","The Magician","The High Priestess","The Empress","The Emperor","The Hierophant","The Lovers","The Chariot","Strength","The Hermit","Wheel of Fortune","Justice","The Hanged Man","Death","Temperance","The Devil","The Tower","The Star","The Moon","The Sun","Judgement","The World"],
    suits: ["Wands","Cups","Swords","Pentacles"],
    ranks: ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"],
    translate: (n) => {
        const mj = {"The Fool":"愚者","The Magician":"魔術師","The High Priestess":"女教皇","The Empress":"女帝","The Emperor":"皇帝","The Hierophant":"法王","The Lovers":"恋人","The Chariot":"戦車","Strength":"力","The Hermit":"隠者","Wheel of Fortune":"運命の輪","Justice":"正義","The Hanged Man":"吊るされた男","Death":"死神","Temperance":"節制","The Devil":"悪魔","The Tower":"塔","The Star":"星","The Moon":"月","The Sun":"太陽","Judgement":"審判","The World":"世界"};
        if(mj[n]) return mj[n];
        const sm={"Wands":"ワンド","Cups":"カップ","Swords":"ソード","Pentacles":"ペンタクル"}, rm={"Ace":"エース","Two":"2","Three":"3","Four":"4","Five":"5","Six":"6","Seven":"7","Eight":"8","Nine":"9","Ten":"10","Page":"ペイジ","Knight":"ナイト","Queen":"クイーン","King":"キング"};
        const p=n.split(" of "); return p.length===2 ? `${sm[p[1]]}の${rm[p[0]]}` : n;
    }
};

const SPREADS = {
    "one": { count:1, name:"ワンオラクル", layout:["メッセージ"], gridAreas:["msg"] },
    "three": { count:3, name:"3枚引き", layout:["過去","現状","未来"], gridAreas:["past","present","future"] },
    "celtic": { count:10, name:"ケルト十字", layout:["現状","障害","意識","過去","意図","未来","自分","環境","願望","結果"], gridAreas:["cross_center","cross_center","unconscious","past","conscious","near_future","querent","external","hopes","outcome"] }
};

let state = { char:null, spread:null };
let drawn = [];

function saveApiKey(){ localStorage.setItem('luminous_key', document.getElementById('apiKeyInput').value); alert('保存しました'); }
function getApiKey(){ return localStorage.getItem('luminous_key'); }

document.querySelectorAll('.char-btn').forEach(b => b.addEventListener('click', () => {
    state.char = b.dataset.char;
    document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('step-question').classList.remove('hidden');
}));

function goToSpread(){
    document.getElementById('step-spread').classList.remove('hidden');
    const opts = document.getElementById('spread-options'); opts.innerHTML = '';
    Object.keys(SPREADS).forEach(k => {
        const btn = document.createElement('button'); btn.className='spread-btn'; btn.textContent=SPREADS[k].name;
        btn.onclick = () => { 
            state.spread = k; 
            document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('divinate-btn').classList.remove('hidden'); 
        };
        opts.appendChild(btn);
    });
}

document.getElementById('divinate-btn').onclick = () => {
    document.getElementById('selection-area').classList.add('hidden');
    document.getElementById('result-area').classList.remove('hidden');
    const def = SPREADS[state.spread];
    let deck = [];
    TAROT_DATA.majors.forEach(n => deck.push({name:n}));
    TAROT_DATA.suits.forEach(s => TAROT_DATA.ranks.forEach(r => deck.push({name:`${r} of ${s}`})));
    deck.sort(() => Math.random() - 0.5);
    const cards = deck.slice(0, def.count).map(c => ({ ...c, isUpright: Math.random() > 0.5, jp: TAROT_DATA.translate(c.name) }));
    drawn = cards.map((c, i) => ({ pos: def.layout[i], name: c.jp, orient: c.isUpright ? '正位置' : '逆位置' }));
    
    const container = document.createElement('div'); container.className = `cards-container tarot-${state.spread}-layout`;
    cards.forEach((c, i) => {
        const slot = document.createElement('div'); slot.className = 'card-slot';
        if(state.spread === 'celtic' && i === 1) slot.classList.add('celtic-obstacle');
        else if(def.gridAreas[i]) slot.style.gridArea = def.gridAreas[i];
        const visual = document.createElement('div'); visual.className = 'card-visual';
        if(!c.isUpright) visual.classList.add('reversed');
        const img = document.createElement('img'); img.className = 'tarot-image';
        img.src = `./assets/images/tarot/${getPath(c.name)}.jpg`;
        visual.appendChild(img); slot.appendChild(visual);
        const nm = document.createElement('div'); nm.className='card-name'; nm.textContent=c.jp;
        slot.appendChild(nm); container.appendChild(slot);
    });
    document.getElementById('visual-area').appendChild(container);
    requestAI();
};

function getPath(name){
    const mj = {"The Fool":"m00","The Magician":"m01","The High Priestess":"m02","The Empress":"m03","The Emperor":"m04","The Hierophant":"m05","The Lovers":"m06","The Chariot":"m07","Strength":"m08","The Hermit":"m09","Wheel of Fortune":"m10","Justice":"m11","The Hanged Man":"m12","Death":"m13","Temperance":"m14","The Devil":"m15","The Tower":"m16","The Star":"m17","The Moon":"m18","The Sun":"m19","Judgement":"m20","The World":"m21"};
    if(mj[name]) return mj[name];
    const s={"Wands":"w","Cups":"c","Swords":"s","Pentacles":"p"}, r={"Ace":"01","Two":"02","Three":"03","Four":"04","Five":"05","Six":"06","Seven":"07","Eight":"08","Nine":"09","Ten":"10","Page":"11","Knight":"12","Queen":"13","King":"14"};
    const p=name.split(" of "); return s[p[1]] + r[p[0]];
}

async function requestAI(){
    const output = document.getElementById('readingOutput'); output.innerHTML = '<div class="reading-loading">魂を込めて読み解いています...</div>';
    const char = CHARACTERS[state.char];
    const prompt = `相談内容：${document.getElementById('questionInput').value}\n展開されたカード：\n${drawn.map(d => `・${d.pos}：${d.name}（${d.orient}）`).join('\n')}`;
    try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}`, 'HTTP-Referer': window.location.href, 'X-Title': 'Luminous Salon' },
            body: JSON.stringify({ model: 'qwen/qwen-2.5-72b-instruct', messages: [{role:'system', content:char.prompt}, {role:'user', content:prompt}], temperature: 0.7 })
        });
        const data = await res.json();
        output.textContent = data.choices[0].message.content;
    } catch(e) { output.textContent = 'エラー：' + e.message; }
}
</script>
</body>
</html>
